<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DND Boutique - CRM Cloud</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Estilos Personalizados -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 text-white p-2.5 rounded-xl shadow-lg">
                <i class="fa-solid fa-shop text-lg"></i>
            </div>
            <h1 class="text-xl font-black tracking-tight text-slate-800">DND Boutique</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative">
                <button onclick="window.toggleNotificaciones()" class="p-3 bg-slate-100 rounded-full text-slate-600 hover:bg-slate-200 transition-all relative">
                    <i class="fa-solid fa-bell"></i>
                    <span id="notif-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-white animate-bounce">0</span>
                </button>
                <div id="panel-notif" class="hidden absolute right-0 mt-3 w-80 bg-white rounded-3xl shadow-2xl border border-slate-100 z-[60] overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                        <span class="text-xs font-black uppercase text-slate-500 tracking-widest">Alertas</span>
                        <span id="notif-count-text" class="text-[10px] bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div id="lista-notificaciones" class="max-h-96 overflow-y-auto p-2 space-y-2"></div>
                </div>
            </div>
            <button onclick="window.toggleModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg active:scale-95 transition-all">
                <i class="fa-solid fa-plus mr-2"></i>Nueva Venta
            </button>
        </div>
    </nav>

    <main class="p-4 md:p-8 max-w-7xl mx-auto">
        <!-- Indicadores de Resumen -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-orange-400">
                <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Seguimiento</p>
                <h3 id="count-pendientes" class="text-2xl md:text-3xl font-black text-slate-800 mt-1">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-blue-500">
                <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">En Envío 🚚</p>
                <h3 id="count-envios" class="text-2xl md:text-3xl font-black text-blue-600 mt-1">0</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-green-400">
                <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Ventas Logradas</p>
                <h3 id="total-ventas" class="text-2xl md:text-3xl font-black text-slate-800 mt-1">$0.00</h3>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm border-l-4 border-l-indigo-400">
                <p class="text-slate-400 text-[9px] font-black uppercase tracking-widest">Socios</p>
                <h3 id="count-clientes" class="text-2xl md:text-3xl font-black text-slate-800 mt-1">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-8 py-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/30">
                <select id="filtro-estado" onchange="window.renderizarTabla()" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-xs font-bold text-slate-600 outline-none w-full md:w-auto">
                    <option value="Todos">Ver Todos</option>
                    <option value="Interesado">🟡 Interesados</option>
                    <option value="Pendiente">🟠 Pendientes</option>
                    <option value="En Envío">🔵 En Envío</option>
                    <option value="Entregado">🟢 Entregados</option>
                </select>
                <div class="relative w-full md:w-72">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input type="text" id="buscador" onkeyup="window.renderizarTabla()" placeholder="Buscar socio u observación..." class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-sm outline-none focus:ring-4 ring-indigo-50 font-medium">
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-[10px] uppercase tracking-widest border-b border-slate-50 font-black">
                            <th class="px-8 py-5">Socio / Pedido</th>
                            <th class="px-8 py-5">Monto</th>
                            <th class="px-8 py-5">Estado</th>
                            <th class="px-8 py-5 text-center">Último Mov.</th>
                            <th class="px-8 py-5 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" class="divide-y divide-slate-50 text-sm font-medium">
                        <!-- Los datos se cargan desde JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Registro/Edición -->
    <div id="modalCliente" class="fixed inset-0 bg-slate-900/60 hidden backdrop-blur-md flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-[2.5rem] w-full max-w-lg p-8 shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-titulo" class="text-xl font-black text-slate-800 uppercase tracking-tight">Registrar Venta</h2>
                <button onclick="window.toggleModal()" class="text-slate-400 hover:text-red-500 p-2"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form id="form-cliente" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="nombre" placeholder="Nombre (Opcional)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none">
                    <input type="number" id="telefono" placeholder="WhatsApp (Ej: 77889900)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none" required>
                </div>
                <textarea id="pedido" rows="2" placeholder="Detalles del pedido (aromas, cantidades...)" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" step="0.01" id="monto" placeholder="Monto $" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none font-bold text-indigo-600">
                    <select id="estado" class="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 font-bold outline-none">
                        <option value="Interesado">🟡 Interesado</option>
                        <option value="Pendiente">🟠 Pendiente</option>
                        <option value="En Envío">🔵 En Envío</option>
                        <option value="Entregado">🟢 Entregado</option>
                    </select>
                </div>
                <textarea id="observaciones" rows="2" placeholder="Notas internas (ej: No responde, espera pago...)" class="w-full p-4 bg-amber-50/50 rounded-2xl border-2 border-transparent focus:border-amber-400 outline-none italic text-slate-600"></textarea>
                
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest active:scale-95">GUARDAR REGISTRO</button>
            </form>
        </div>
    </div>

    <!-- Carga del script principal -->
    <script src="js/index.js" type="module"></script>
</body>
</html>
